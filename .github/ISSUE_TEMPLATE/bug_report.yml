name: Bug report
description: Report a defect in Creda
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. If this is a security issue,
        **stop** and use [private vulnerability reporting](../../security/advisories/new)
        instead — see `SECURITY.md`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Component / crate
      description: Which crate or component is affected (e.g. `creda-store`, `bridge`)?
    validations:
      required: true

  - type: input
    id: milestone
    attributes:
      label: Milestone
      description: Which milestone owns this component (M0–M9)?
      placeholder: "M3"

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git SHA or tag where you observed the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact commands or test names. The smaller the repro, the faster the fix.
      placeholder: |
        1. `make test PKG=creda-store`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did the spec say should happen? Cite the section if you can.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include logs or backtraces in fenced code blocks.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, anything else relevant. The dev container handles
        the toolchain, but host details still matter.
      placeholder: |
        - OS: macOS 14.5 / Ubuntu 22.04 / ...
        - Docker: 25.x
        - Arch: arm64 / x86_64

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions for duplicates.
          required: true
        - label: I am using synthetic data only — no real PHI is attached.
          required: true
        - label: This is not a security vulnerability (if it is, I will use private reporting instead).
          required: true
