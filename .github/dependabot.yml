# Dependabot configuration.
#
# Version updates are PAUSED: `open-pull-requests-limit: 0` on every ecosystem, so Dependabot opens
# no routine dependency-bump PRs. Pinned dependencies (e.g. libp2p, HAPI) are upgraded deliberately
# and verified through `anchor creda` / `make bridge`, not auto-bumped — and for 0.x crates a
# "minor" bump is breaking, which a semver-major ignore rule would not catch, so the whole ecosystem
# is silenced rather than filtered.
#
# SECURITY updates are unaffected by this file: they are controlled in repo Settings -> Code security
# and analysis ("Dependabot security updates"), have their own internal PR limit, and still open PRs
# for real advisories. To resume version updates for an ecosystem, restore its limit (was 10 for
# cargo/gradle, 5 for github-actions/docker).
version: 2
updates:
  # Rust workspace (root Cargo.toml + crates/*)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "deps(cargo)"
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]

  # Java / Kotlin bridge (Gradle)
  - package-ecosystem: "gradle"
    directory: "/bridge"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "java"
    commit-message:
      prefix: "deps(gradle)"
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]

  # GitHub Actions — pin to SHAs, but let Dependabot bump them.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "deps(actions)"

  # Dev container image
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "deps(docker)"
