name: ci-java
on:
  push:
    branches: [main]
  pull_request:
jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect bridge build
        id: bridge
        run: |
          if [ -f bridge/build.gradle ] || [ -f bridge/build.gradle.kts ] || [ -f bridge/pom.xml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No bridge build file yet (added in M7) - skipping."
          fi
      - name: Set up JDK
        if: steps.bridge.outputs.present == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Gradle
        if: steps.bridge.outputs.present == 'true'
        uses: gradle/actions/setup-gradle@v6
        with:
          # Pin to Gradle 8.x: the Spring Boot 3.3.2 plugin's bootJar still calls
          # CopyProcessingSpec.getDirMode(), which Gradle 9 removed. Without a committed wrapper,
          # setup-gradle would otherwise fetch the latest (9.x) and fail packaging. Revisit when
          # the Spring Boot plugin is bumped to a Gradle-9-compatible release.
          gradle-version: "8.10.2"
      - name: Build and test bridge
        if: steps.bridge.outputs.present == 'true'
        working-directory: bridge
        # No committed wrapper jar (binary), so use the system Gradle from setup-gradle; it adds
        # the wrapper on first run. The protobuf-gradle-plugin fetches protoc + the grpc-java
        # plugin from Maven, so no system protoc is needed.
        run: |
          if [ -f gradlew ]; then ./gradlew build --no-daemon; else gradle build --no-daemon; fi
