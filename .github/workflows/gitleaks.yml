name: gitleaks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    # Weekly full-history scan to catch anything that slipped in via merge.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pin to a commit SHA — Dependabot will bump it.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so the scan covers the whole repo, not just the latest commit.
          fetch-depth: 0

      # Run the gitleaks OSS binary directly instead of gitleaks/gitleaks-action: as of action
      # v2 the wrapper requires a paid GITLEAKS_LICENSE for ALL organization repos. The tool
      # itself is MIT-licensed and free — we forgo the action's PR comments / summary but keep
      # the scan as a hard gate. Bump VERSION by hand (Dependabot can't track a binary download).
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        # Scans full git history (fetch-depth 0); auto-uses the repo's .gitleaks.toml allowlist.
        # Exits non-zero on any finding, failing the job.
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --exit-code 1
