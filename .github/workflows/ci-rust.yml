name: ci-rust
on:
  push:
    branches: [main]
  pull_request:
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Detect workspace members
        id: members
        run: |
          if grep -qE '^\s*members\s*=\s*\[\s*\]' Cargo.toml; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "Workspace has no members yet (M0 placeholder) - skipping build/test."
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install system build deps
        if: steps.members.outputs.empty == 'false'
        # libclang: RocksDB's bindgen FFI (librocksdb-sys) needs it on EVERY workspace build, not
        # just the gRPC feature — without it the build fails with "Unable to find libclang".
        # protobuf-compiler: the gRPC-feature clippy/test steps below. Installing both here makes
        # the Rust build hermetic instead of relying on whatever the runner image happens to ship.
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev protobuf-compiler
      - name: Format check
        if: steps.members.outputs.empty == 'false'
        run: cargo fmt --all -- --check
      - name: Clippy
        if: steps.members.outputs.empty == 'false'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        if: steps.members.outputs.empty == 'false'
        run: cargo test --workspace
      - name: Clippy (gRPC feature)
        if: steps.members.outputs.empty == 'false'
        run: cargo clippy -p creda-core --features grpc --all-targets -- -D warnings
      - name: Test (gRPC feature)
        if: steps.members.outputs.empty == 'false'
        run: cargo test -p creda-core --features grpc
      - name: Release build
        if: steps.members.outputs.empty == 'false'
        run: cargo build --workspace --release
      - name: Manifest sanity (always)
        run: cargo metadata --no-deps --format-version 1 > /dev/null && echo "Cargo manifest valid."

  # The off-by-default libp2p adapter (creda-net `--features libp2p`) is otherwise never compiled
  # in CI, so rust-libp2p API drift — the constructor/event-shape risk flagged by
  # TODO(libp2p-verify) — would only surface when a real peer is brought up. This job compiles and
  # lints it against the pinned version on every push. Separate from `rust` so its heavy compile
  # doesn't slow the core gate, and so a first-build API reconciliation is an isolated signal.
  libp2p-adapter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system build deps
        run: sudo apt-get update && sudo apt-get install -y clang libclang-dev protobuf-compiler
      - name: Clippy the libp2p adapter against the pinned rust-libp2p
        run: cargo clippy -p creda-net --features libp2p --all-targets -- -D warnings
