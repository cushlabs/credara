syntax = "proto3";

// Creda Core gRPC API (spec §10.1.3). The contract between Creda Core and clients (the FHIR
// Bridge, the CLI, ops tooling). To avoid mirroring the full event schema in protobuf, events
// and payloads transit as canonical-CBOR bytes (the same bytes used for signing/hashing); the
// gRPC layer is a thin transport over the engine.
package creda;

// Java options for the HAPI FHIR Bridge's grpc-java codegen (M7). Ignored by the Rust/prost
// build, which uses the same .proto.
option java_package = "health.creda.grpc";
option java_multiple_files = true;

message CreateEventRequest {
  // Canonical-CBOR-encoded EventPayload (creda-events).
  bytes event_payload_cbor = 1;
  // Parent event UUIDs (16 bytes each).
  repeated bytes parent_ids = 2;
}

message EventReply {
  // Canonical-CBOR-encoded IdentityEventNode.
  bytes event_cbor = 1;
}

message GetEventRequest { bytes id = 1; }
message GetEventReply {
  bool found = 1;
  bytes event_cbor = 2;
}

message EntryPoints { repeated bytes ids = 1; }

// One asserted value for a demographic field (§5.3) — the tokenized value plus its
// confidence-weighted, attestation-amplified score. Values within a field arrive confidence-desc.
message EffectiveIdentityValue {
  string value = 1;             // tokenized value (opaque; never raw PII)
  uint32 confidence = 2;        // basis points 0–10000
  repeated bytes supporting = 3; // Assert event ids backing this value
}
message EffectiveIdentityField {
  string key = 1;               // kebab FieldKey, e.g. "date-of-birth", "name-family", "ext:<name>"
  bool disputed = 2;            // institutions asserted conflicting values (§5.3.4)
  repeated EffectiveIdentityValue values = 3;
}
message EffectiveIdentityReply {
  // Human-readable projection, retained for debugging/CLI.
  string effective_identity_debug = 1;
  // Structured per-field projection (§5.2.4 / §5.3) — the read behind the Bridge's effective
  // identity surface; the client renders effective demographics + per-field confidence/disagreement.
  repeated EffectiveIdentityField fields = 2;
}

message MatchRequest { repeated string tokens = 1; }
message MatchReply { repeated bytes ids = 1; }

// List the events of a patient subgraph, optionally filtered by type — the read surface behind
// the Bridge's `Consent?patient=` search (§8.2.9 read-back) and future Provenance reads.
message SubgraphEventsRequest {
  // Entry-point event ids identifying the subgraph (16 bytes each).
  repeated bytes entry_points = 1;
  // IdentityEventType variant names to include (e.g. "AuthorizationGrant"); empty = all types.
  repeated string event_types = 2;
}
message SubgraphEventsReply {
  // Canonical-CBOR-encoded IdentityEventNodes, sorted by logical clock.
  repeated bytes event_cbor = 1;
}

// Grant purpose (§4.3.1). Mirrors creda_events::GrantPurpose; UNSPECIFIED is rejected so a
// client that forgets to set a purpose fails loudly rather than defaulting silently.
enum GrantPurpose {
  GRANT_PURPOSE_UNSPECIFIED = 0;
  TREATMENT = 1;
  PAYMENT = 2;
  OPERATIONS = 3;
  PUBLIC_HEALTH = 4;
  RESEARCH = 5;
  AI_TRAINING = 6;
  AI_INFERENCE = 7;
  FEDERAL_PROGRAM = 8;
}

// Use-mode constraint on a grant (§4.3.1). Mirrors creda_events::UseMode.
enum UseMode {
  USE_MODE_UNSPECIFIED = 0;
  READ_ONLY = 1;
  READ_AND_RELY = 2;
  READ_AND_EXPORT = 3;
}

// The requesting institution and the audience memberships it satisfies (§4.6 step 3). Class /
// wildcard membership normally comes from the Participant Registry and is supplied by the caller.
message RequesterContext {
  // The requester's UDAP certificate fingerprint (raw fingerprint bytes, not a public key).
  bytes fingerprint = 1;
  repeated string classes = 2;    // e.g. "any-tefca-qhin"
  repeated string wildcards = 3;  // e.g. "active-baa"
}

message AuthRequest {
  // Entry-point event ids identifying the patient subgraph to evaluate against.
  repeated bytes entry_points = 1;
  RequesterContext requester = 2;
  GrantPurpose purpose = 3;
  UseMode use_mode = 4;
  // IdentityEventType variant names (e.g. "Assert", "AuthorizationGrant"); empty = any.
  repeated string requested_event_types = 5;
  // Requested subgraph segments by entry-point event id; empty = any.
  repeated bytes requested_segments = 6;
  // Requested data categories; empty = any.
  repeated string requested_data_categories = 7;
}
message AuthReply {
  bool authorized = 1;
  repeated bytes covering_grants = 2;
  string reason = 3;
}

message Empty {}
message Metrics { uint64 event_count = 1; }

// The institutions this peer has seen: the distinct audience display names appearing in
// AuthorizationGrants across the whole local store. The read behind the Bridge's `GET /Organization`
// discovery surface — a client can offer "share with an institution already on the network" instead
// of hardcoding a list. InstitutionId audiences (raw fingerprints) render as `fpr:<hex>`.
message InstitutionsReply { repeated string names = 1; }

// The §8.2.2 CredaPatient identity envelope for a subgraph — the deterministic, peer-identical
// values the Bridge needs to emit CredaPatient's mustSupport extensions. Computed in shared graph
// logic so every peer agrees byte-for-byte.
message SubgraphIdentityReply {
  bytes subgraph_id = 1;          // Blake3 over the sorted root-set ids (32 bytes)
  repeated bytes root_set = 2;    // sorted root-set event ids (16 bytes each)
  bytes last_modified_event = 3;  // most recently authored event id; empty for an empty subgraph
}

service Creda {
  rpc CreateEvent(CreateEventRequest) returns (EventReply);
  rpc GetEvent(GetEventRequest) returns (GetEventReply);
  rpc GetSubgraphEvents(SubgraphEventsRequest) returns (SubgraphEventsReply);
  rpc GetEffectiveIdentity(EntryPoints) returns (EffectiveIdentityReply);
  rpc MatchByTokens(MatchRequest) returns (MatchReply);
  rpc EvaluateAuthorization(AuthRequest) returns (AuthReply);
  rpc GetMetrics(Empty) returns (Metrics);
  rpc ListInstitutions(Empty) returns (InstitutionsReply);
  rpc GetSubgraphIdentity(EntryPoints) returns (SubgraphIdentityReply);
}
