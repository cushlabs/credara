syntax = "proto3";

// Creda Core gRPC API (spec §10.1.3). The contract between Creda Core and clients (the FHIR
// Bridge, the CLI, ops tooling). To avoid mirroring the full event schema in protobuf, events
// and payloads transit as canonical-CBOR bytes (the same bytes used for signing/hashing); the
// gRPC layer is a thin transport over the engine.
package creda;

// Java options for the HAPI FHIR Bridge's grpc-java codegen (M7). Ignored by the Rust/prost
// build, which uses the same .proto.
option java_package = "health.creda.grpc";
option java_multiple_files = true;

message CreateEventRequest {
  // Canonical-CBOR-encoded EventPayload (creda-events).
  bytes event_payload_cbor = 1;
  // Parent event UUIDs (16 bytes each).
  repeated bytes parent_ids = 2;
}

message EventReply {
  // Canonical-CBOR-encoded IdentityEventNode.
  bytes event_cbor = 1;
}

message GetEventRequest { bytes id = 1; }
message GetEventReply {
  bool found = 1;
  bytes event_cbor = 2;
}

message EntryPoints { repeated bytes ids = 1; }

message EffectiveIdentityReply {
  // Human-readable projection for now; a structured reply is a follow-up (see grpc.rs).
  string effective_identity_debug = 1;
}

message MatchRequest { repeated string tokens = 1; }
message MatchReply { repeated bytes ids = 1; }

// Grant purpose (§4.3.1). Mirrors creda_events::GrantPurpose; UNSPECIFIED is rejected so a
// client that forgets to set a purpose fails loudly rather than defaulting silently.
enum GrantPurpose {
  GRANT_PURPOSE_UNSPECIFIED = 0;
  TREATMENT = 1;
  PAYMENT = 2;
  OPERATIONS = 3;
  PUBLIC_HEALTH = 4;
  RESEARCH = 5;
  AI_TRAINING = 6;
  AI_INFERENCE = 7;
  FEDERAL_PROGRAM = 8;
}

// Use-mode constraint on a grant (§4.3.1). Mirrors creda_events::UseMode.
enum UseMode {
  USE_MODE_UNSPECIFIED = 0;
  READ_ONLY = 1;
  READ_AND_RELY = 2;
  READ_AND_EXPORT = 3;
}

// The requesting institution and the audience memberships it satisfies (§4.6 step 3). Class /
// wildcard membership normally comes from the Participant Registry and is supplied by the caller.
message RequesterContext {
  // The requester's UDAP certificate fingerprint (raw fingerprint bytes, not a public key).
  bytes fingerprint = 1;
  repeated string classes = 2;    // e.g. "any-tefca-qhin"
  repeated string wildcards = 3;  // e.g. "active-baa"
}

message AuthRequest {
  // Entry-point event ids identifying the patient subgraph to evaluate against.
  repeated bytes entry_points = 1;
  RequesterContext requester = 2;
  GrantPurpose purpose = 3;
  UseMode use_mode = 4;
  // IdentityEventType variant names (e.g. "Assert", "AuthorizationGrant"); empty = any.
  repeated string requested_event_types = 5;
  // Requested subgraph segments by entry-point event id; empty = any.
  repeated bytes requested_segments = 6;
  // Requested data categories; empty = any.
  repeated string requested_data_categories = 7;
}
message AuthReply {
  bool authorized = 1;
  repeated bytes covering_grants = 2;
  string reason = 3;
}

message Empty {}
message Metrics { uint64 event_count = 1; }

service Creda {
  rpc CreateEvent(CreateEventRequest) returns (EventReply);
  rpc GetEvent(GetEventRequest) returns (GetEventReply);
  rpc GetEffectiveIdentity(EntryPoints) returns (EffectiveIdentityReply);
  rpc MatchByTokens(MatchRequest) returns (MatchReply);
  rpc EvaluateAuthorization(AuthRequest) returns (AuthReply);
  rpc GetMetrics(Empty) returns (Metrics);
}
