# Creda clients — nginx config. SPA history fallback so /clinician/patients/p2 reloads cleanly.
#
# Listens on :8080 so the container can run non-root (DQ-1) — :80 requires CAP_NET_BIND_SERVICE,
# which the chart's securityContext drops.

server {
  listen 8080;
  listen [::]:8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # gzip the build output. The Vite-emitted bundles are large but extremely compressible.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-lived caching for the hashed asset bundle; never cache index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

  # SPA fallback — any path that doesn't match a file falls through to index.html so React
  # Router handles it. Without this, refreshing /clinician returns 404 from nginx.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
