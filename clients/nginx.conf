# Creda clients — static nginx config. COPYed into /etc/nginx/conf.d/default.conf at build
# time; never modified at runtime. Two runtime hooks the entrypoint generates into /tmp:
#
#   /tmp/runtime-config.js          — window.__CREDA_FHIR_BASE__ override for the SPA.
#                                     Served via `location = /runtime-config.js` below.
#   /tmp/fhir-overrides.d/*.conf    — optional /fhir/* reverse-proxy block, included below.
#                                     Empty directory in mock mode = no proxy.
#
# Listens on :8080 so the container can run non-root (DQ-1) — :80 would require
# CAP_NET_BIND_SERVICE, which the chart's securityContext drops.

server {
  listen 8080;
  listen [::]:8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-lived caching for the hashed asset bundle; never cache index.html.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

  # Runtime-injected SPA config. Aliased to /tmp so the entrypoint can write it without
  # needing write access to /usr/share/nginx/html (see clients/docker-entrypoint.sh).
  # default_type explicit because nginx's mime.types may or may not have .js mapped.
  location = /runtime-config.js {
    alias /tmp/runtime-config.js;
    default_type application/javascript;
    add_header Cache-Control "no-cache";
  }

  # Optional /fhir/* reverse-proxy drop-in. Empty directory = no proxy (mock mode); a
  # single fhir.conf file = real-mode proxy. nginx tolerates an empty glob match.
  include /tmp/fhir-overrides.d/*.conf;

  # SPA fallback — any path that doesn't match a file falls through to index.html so React
  # Router handles it. Without this, refreshing /clinician returns 404 from nginx.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
