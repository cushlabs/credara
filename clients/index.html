<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creda</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Runtime FHIR base. Two-layer approach so this index.html is *immutable* at runtime:

      1. The inline default below establishes mock mode if no override loads. Used by
         `pnpm dev` (no nginx) and by any deploy that doesn't ship a runtime-config.js.
      2. The optional `/runtime-config.js` is generated by clients/docker-entrypoint.sh
         INTO /tmp/runtime-config.js (always writable, no permission games) and served by
         nginx via a `location = /runtime-config.js` alias. If it exists, it sets
         window.__CREDA_FHIR_BASE__ AFTER the inline default, so its value wins.

      We deliberately do NOT sed-in-place on this file at container start: the SPA bundle
      lives under /usr/share/nginx/html which is often immutable / not writable by the
      runtime uid in non-root images and under rootless podman.
    -->
    <script>window.__CREDA_FHIR_BASE__ = "";</script>
    <script src="/runtime-config.js" onerror="void 0"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
