<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Credara · My Health Consent (patient client mockup)</title>
<style>
  :root{
    --bg:#eef3f8; --surface:#fff; --surface-2:#f6f9fc;
    --ink:#0f1b2d; --ink-2:#46566b; --ink-3:#7c8aa0; --line:#e1e8f1;
    --primary:#1d4ed8; --primary-soft:#e8efff;
    --good:#15803d; --warn:#b45309; --bad:#b91c1c;
    --grant:#1d4ed8; --revoke:#b91c1c; --access:#0e7490;
    --shadow:0 1px 2px rgba(15,27,45,.05), 0 8px 24px rgba(15,27,45,.07);
    --radius:16px; font-synthesis:none;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  .muted{color:var(--ink-3);}

  /* phone-like centered app column */
  .app{max-width:460px;margin:0 auto;min-height:100vh;background:var(--surface);box-shadow:var(--shadow);display:flex;flex-direction:column;}
  .topbar{background:var(--ink);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:20;}
  .topbar .brand{display:flex;align-items:center;gap:10px;font-weight:650;font-size:15px;}
  .topbar .brand .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#60a5fa,#1d4ed8);display:grid;place-items:center;font-weight:800;font-size:14px;}
  .topbar .who{display:flex;align-items:center;gap:11px;margin-top:13px;}
  .topbar .avatar{width:42px;height:42px;border-radius:50%;background:#3b82f6;display:grid;place-items:center;font-weight:700;font-size:16px;}
  .topbar .nm{font-weight:650;}
  .topbar .sub{font-size:12px;color:#aebfd4;display:flex;align-items:center;gap:6px;margin-top:1px;}

  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
  .tabs button{flex:1;border:0;background:transparent;padding:13px 6px;font-size:13.5px;font-weight:600;color:var(--ink-3);border-bottom:2.5px solid transparent;}
  .tabs button.on{color:var(--primary);border-bottom-color:var(--primary);}

  .body{padding:18px;display:flex;flex-direction:column;gap:14px;flex:1;}
  .lead{font-size:13.5px;color:var(--ink-2);background:var(--primary-soft);border:1px solid #cfe0ff;border-radius:12px;padding:11px 13px;}
  .lead b{color:var(--ink);}

  h2.sec{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-3);margin:6px 2px 0;}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;}
  .card.rev{opacity:.62;}
  .card .ch{display:flex;align-items:flex-start;gap:11px;}
  .card .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:700;flex:none;font-size:15px;}
  .card .nm{font-weight:650;font-size:15px;}
  .card .meta{color:var(--ink-3);font-size:12.5px;margin-top:1px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0 0;}
  .chip{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);}
  .chip.purpose{background:var(--primary-soft);border-color:#cfe0ff;color:var(--primary);}
  .row2{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px;}
  .small{font-size:12px;color:var(--ink-3);}

  .btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;}
  .btn:hover{border-color:#b9c6d8;}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;width:100%;padding:13px;font-size:15px;}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.danger{background:#fdeaea;border-color:#f3c4c4;color:#b91c1c;}
  .btn.linky{border:0;background:transparent;color:var(--primary);padding:6px 0;font-size:12.5px;}

  .reveal{margin-top:11px;border-top:1px dashed var(--line);padding-top:10px;display:none;}
  .reveal.on{display:block;}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:4px 10px;font-size:12px;}
  .kv .k{color:var(--ink-3);}
  .kv .v{font-weight:550;word-break:break-word;}

  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:650;padding:2px 8px;border-radius:999px;}
  .b-active{background:#e7f6ec;color:#15803d;}
  .b-revoked{background:#f1f4f8;color:#64748b;}
  .b-expires{background:#fdf1e3;color:#b45309;}

  /* form */
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12.5px;font-weight:600;color:var(--ink-2);}
  .field select,.field input{padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14.5px;background:#fff;color:var(--ink);}
  .field select:focus,.field input:focus{outline:2px solid #bcd2ff;border-color:var(--primary);}
  .seg2{display:flex;gap:8px;}
  .seg2 button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px;font-size:13px;font-weight:600;color:var(--ink-2);}
  .seg2 button.on{background:var(--primary-soft);border-color:var(--primary);color:var(--primary);}

  /* timeline */
  .tl{display:flex;flex-direction:column;gap:0;}
  .tl .item{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .tl .item:last-child{border-bottom:0;}
  .tl .dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px;flex:none;}
  .tl .t{font-size:13.5px;}
  .tl .w{font-size:12px;color:var(--ink-3);margin-top:1px;}

  /* modal */
  .modal{position:fixed;inset:0;display:grid;place-items:end center;z-index:60;opacity:0;pointer-events:none;transition:opacity .15s;}
  .modal.on{opacity:1;pointer-events:auto;}
  .modal .scrim{position:absolute;inset:0;background:rgba(15,27,45,.4);}
  .modal .sheet{position:relative;width:100%;max-width:460px;background:#fff;border-radius:18px 18px 0 0;padding:18px 18px 22px;box-shadow:0 -10px 40px rgba(15,27,45,.25);transform:translateY(20px);transition:transform .2s;}
  .modal.on .sheet{transform:translateY(0);}
  .modal h3{margin:2px 0 8px;font-size:17px;}
  .modal .note{color:var(--ink-2);font-size:13.5px;}
  .codecard{background:#0f1b2d;color:#cfe3ee;border-radius:12px;padding:12px 14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.6;margin-top:13px;white-space:pre;overflow:auto;}
  .codecard .kk{color:#8fc7ff;} .codecard .vv{color:#f5d49b;}
  .mft{display:flex;gap:10px;margin-top:16px;}
  .mft .btn{flex:1;text-align:center;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 17px;border-radius:12px;font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .2s;z-index:70;display:flex;align-items:center;gap:9px;max-width:90vw;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand"><span class="mark">C</span> My Health Consent</div>
      <div class="who">
        <div class="avatar">MG</div>
        <div>
          <div class="nm">Maria Gonzalez</div>
          <div class="sub">🔑 your patient peer · choices signed on this device</div>
        </div>
      </div>
    </div>

    <div class="tabs" id="tabs">
      <button data-t="access" class="on">Who has access</button>
      <button data-t="share">Share access</button>
      <button data-t="activity">Activity</button>
    </div>

    <div class="body" id="view"></div>
  </div>

  <div class="modal" id="modal">
    <div class="scrim" onclick="closeModal()"></div>
    <div class="sheet">
      <h3 id="mTitle"></h3>
      <div class="note" id="mNote"></div>
      <div id="mEvent"></div>
      <div class="mft">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn primary" id="mConfirm" style="width:auto"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ----------------------------------------------------------------------------
   Credara patient consent client — interactive mockup (fake data).
   The patient manages who may use their identity records. Every choice is an
   AuthorizationGrant (or AuthorizationRevocation) signed by the patient's own
   key; revocations propagate across the network and are enforced locally by
   every responding peer (§4, §4.6, §4.7). The patient sees only their own
   identity + authorization events — never anyone else's clinical data.
---------------------------------------------------------------------------- */

const PATIENT = 'Maria Gonzalez';

let GRANTS = [
  {id:'g1', who:'Mercy General Hospital', kind:'institution', purpose:'Treatment', use:'Read & rely', scope:'Identity + history', since:'2023-02-10', expires:'No expiry', status:'active'},
  {id:'g2', who:'Northside Clinic', kind:'institution', purpose:'Treatment', use:'Read only', scope:'Identity only', since:'2024-06-01', expires:'2025-06-01', status:'active'},
  {id:'g3', who:'Apex Research — study NCT-1142', kind:'institution', purpose:'Research', use:'Read & export', scope:'Identity (de-identified)', since:'2024-09-15', expires:'2026-09-15', status:'active'},
  {id:'g4', who:'Any TEFCA QHIN', kind:'class', purpose:'Treatment', use:'Read & rely', scope:'Identity only', since:'2023-01-01', expires:'No expiry', status:'active'},
];

let ACTIVITY = [
  {ev:'access', text:'Apex Research accessed your identity (export receipt)', when:'Oct 2, 2024'},
  {ev:'grant',  text:'Granted Research access to Apex Research', when:'Sep 15, 2024'},
  {ev:'grant',  text:'Granted Treatment access to Northside Clinic', when:'Jun 1, 2024'},
  {ev:'grant',  text:'Granted Treatment access to Mercy General Hospital', when:'Feb 10, 2023'},
];

const PURPOSES = ['Treatment','Payment','Operations','Public health','Research','AI training','AI inference','Federal program'];
const USES = ['Read only','Read & rely','Read & export'];
const SCOPES = ['Identity only','Identity + history','Identity (de-identified)'];

const EV_COLOR = {grant:'var(--grant)', revoke:'var(--revoke)', access:'var(--access)'};
const EV_LETTER = {grant:'+', revoke:'–', access:'↧'};

const state = {tab:'access', form:{kind:'institution', who:'', purpose:'Treatment', use:'Read & rely', scope:'Identity only', expires:'No expiry'}};
const $ = id=>document.getElementById(id);

function whoColor(s){let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))>>>0;return ['#1d4ed8','#0e7490','#7c3aed','#15803d','#b45309','#be185d'][h%6];}
function initials(s){const w=s.replace(/[^A-Za-z ]/g,'').split(' ').filter(Boolean);return ((w[0]||'?')[0]+(w[1]?w[1][0]:'')).toUpperCase();}

/* ---------------- views ---------------- */
function render(){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===state.tab));
  if(state.tab==='access') renderAccess();
  else if(state.tab==='share') renderShare();
  else renderActivity();
}

function renderAccess(){
  const active=GRANTS.filter(g=>g.status==='active');
  const revoked=GRANTS.filter(g=>g.status==='revoked');
  $('view').innerHTML = `
    <div class="lead">You control who can use your identity records. Each choice is <b>signed by your key</b> on this device and takes effect across the network within seconds — and so does stopping.</div>
    <h2 class="sec">${active.length} sharing now</h2>
    ${active.map(grantCard).join('') || '<div class="muted small" style="padding:4px">You are not sharing with anyone.</div>'}
    ${revoked.length?`<h2 class="sec">Stopped</h2>${revoked.map(grantCard).join('')}`:''}`;
}

function grantCard(g){
  const revoked=g.status==='revoked';
  const expBadge = g.expires==='No expiry'
    ? `<span class="badge b-active"><span>●</span>Active</span>`
    : `<span class="badge b-expires">expires ${g.expires}</span>`;
  return `<div class="card ${revoked?'rev':''}">
    <div class="ch">
      <div class="ic" style="background:${whoColor(g.who)}">${initials(g.who)}</div>
      <div style="flex:1">
        <div class="nm">${g.who}</div>
        <div class="meta">${g.kind==='class'?'institution class':'institution'} · sharing since ${g.since}</div>
      </div>
      ${revoked?'<span class="badge b-revoked">stopped</span>':expBadge}
    </div>
    <div class="chips">
      <span class="chip purpose">${g.purpose}</span>
      <span class="chip">can: ${g.use}</span>
      <span class="chip">covers: ${g.scope}</span>
    </div>
    <div class="row2">
      <button class="btn linky" onclick="toggleReveal('${g.id}')">View signed record ›</button>
      ${revoked?'<span class="small">stopped just now</span>':`<button class="btn danger" onclick="askRevoke('${g.id}')">Stop sharing</button>`}
    </div>
    <div class="reveal" id="rv-${g.id}">
      <div class="kv">
        <div class="k">event_type</div><div class="v">AuthorizationGrant</div>
        <div class="k">audience</div><div class="v">${g.who}</div>
        <div class="k">purpose</div><div class="v">${g.purpose}</div>
        <div class="k">use_mode</div><div class="v">${g.use}</div>
        <div class="k">scope</div><div class="v">${g.scope}</div>
        <div class="k">expiration</div><div class="v">${g.expires}</div>
        <div class="k">signed_by</div><div class="v">${PATIENT} (your key)</div>
        <div class="k">status</div><div class="v">${revoked?'revoked':'active'}</div>
      </div>
    </div>
  </div>`;
}
function toggleReveal(id){ $('rv-'+id).classList.toggle('on'); }

function renderShare(){
  const f=state.form;
  $('view').innerHTML = `
    <div class="lead">Grant someone access to your identity records. You choose <b>who</b>, <b>why</b>, <b>what</b>, and <b>for how long</b> — and you can stop any time.</div>
    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      <div class="field">
        <label>Who are you sharing with?</label>
        <div class="seg2">
          <button class="${f.kind==='institution'?'on':''}" onclick="setForm('kind','institution')">A specific institution</button>
          <button class="${f.kind==='class'?'on':''}" onclick="setForm('kind','class')">A class of providers</button>
        </div>
      </div>
      <div class="field">
        <label>${f.kind==='institution'?'Institution name':'Provider class'}</label>
        ${f.kind==='institution'
          ? `<input id="who" placeholder="e.g. Lakeside Hospital" value="${f.who.replace(/"/g,'&quot;')}" oninput="setForm('who',this.value)" />`
          : `<select id="who" onchange="setForm('who',this.value)">
               <option value=""${f.who===''?' selected':''}>Choose a class…</option>
               <option ${f.who==='Any TEFCA QHIN'?'selected':''}>Any TEFCA QHIN</option>
               <option ${f.who==='Any provider with an active BAA'?'selected':''}>Any provider with an active BAA</option>
               <option ${f.who==='Any treating provider'?'selected':''}>Any treating provider</option>
             </select>`}
      </div>
      <div class="field">
        <label>Purpose</label>
        <select onchange="setForm('purpose',this.value)">${PURPOSES.map(p=>`<option ${f.purpose===p?'selected':''}>${p}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>What they can do</label>
        <select onchange="setForm('use',this.value)">${USES.map(u=>`<option ${f.use===u?'selected':''}>${u}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>What it covers</label>
        <select onchange="setForm('scope',this.value)">${SCOPES.map(s=>`<option ${f.scope===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Expires</label>
        <select onchange="setForm('expires',this.value)">
          ${['No expiry','In 1 year','In 90 days'].map(e=>`<option ${f.expires===e?'selected':''}>${e}</option>`).join('')}
        </select>
      </div>
      <button class="btn primary" onclick="askGrant()">Review &amp; authorize</button>
      <div class="small" style="text-align:center">A research or AI purpose always requires this explicit grant — it is never presumed.</div>
    </div>`;
}
function setForm(k,v){ state.form[k]=v; if(k==='kind'){state.form.who='';} renderShare(); }

function renderActivity(){
  $('view').innerHTML = `
    <div class="lead">Your consent history — grants and revocations you have made, and when someone used an access you granted.</div>
    <div class="card"><div class="tl">${ACTIVITY.map(a=>`
      <div class="item">
        <div class="dot" style="background:${EV_COLOR[a.ev]}">${EV_LETTER[a.ev]}</div>
        <div><div class="t">${a.text}</div><div class="w">${a.when}${a.ev!=='access'?' · signed by you':''}</div></div>
      </div>`).join('')}</div></div>`;
}

/* ---------------- actions (via confirm modal) ---------------- */
let PENDING=null;
function askRevoke(id){
  const g=GRANTS.find(x=>x.id===id);
  PENDING={type:'revoke', id};
  $('mTitle').textContent='Stop sharing with '+g.who+'?';
  $('mNote').innerHTML='Access ends right away. A signed revocation propagates to the network and every peer enforces it locally within seconds (§4.7). Anything already exported under prior consent can still be re-checked against this revocation.';
  $('mEvent').innerHTML=`<div class="codecard"><span class="kk">event_type</span>: <span class="vv">"AuthorizationRevocation"</span>
<span class="kk">target_grant</span>: <span class="vv">"${g.id}"</span>
<span class="kk">audience</span>:&nbsp;&nbsp;&nbsp;&nbsp; <span class="vv">"${g.who}"</span>
<span class="kk">signed_by</span>:&nbsp;&nbsp;&nbsp; <span class="vv">"${PATIENT} (your key)"</span></div>`;
  const b=$('mConfirm'); b.textContent='Stop sharing'; b.className='btn danger'; b.style.width='auto'; b.onclick=commit;
  openModal();
}
function askGrant(){
  const f=state.form;
  if(!f.who.trim()){ toast('Choose who you are sharing with first'); state.tab='share'; return; }
  PENDING={type:'grant'};
  $('mTitle').textContent='Authorize access?';
  $('mNote').innerHTML=`You are granting <b>${f.who}</b> ${f.use.toLowerCase()} access to <b>${f.scope.toLowerCase()}</b> for <b>${f.purpose}</b>. This is signed by your key and is bound to your records only — it can't be transferred to anyone else.`;
  $('mEvent').innerHTML=`<div class="codecard"><span class="kk">event_type</span>: <span class="vv">"AuthorizationGrant"</span>
<span class="kk">audience</span>:&nbsp; <span class="vv">"${f.who}"</span>
<span class="kk">purpose</span>:&nbsp; <span class="vv">"${f.purpose}"</span>
<span class="kk">use_mode</span>: <span class="vv">"${f.use}"</span>
<span class="kk">scope</span>:&nbsp;&nbsp;&nbsp; <span class="vv">"${f.scope}"</span>
<span class="kk">expiration</span>: <span class="vv">"${f.expires}"</span>
<span class="kk">signed_by</span>: <span class="vv">"${PATIENT} (your key)"</span></div>`;
  const b=$('mConfirm'); b.textContent='Authorize'; b.className='btn primary'; b.style.width='auto'; b.onclick=commit;
  openModal();
}
function commit(){
  if(PENDING.type==='revoke'){
    const g=GRANTS.find(x=>x.id===PENDING.id); g.status='revoked';
    ACTIVITY.unshift({ev:'revoke', text:'Stopped sharing with '+g.who, when:'Just now'});
    closeModal(); state.tab='access'; render(); toast('Sharing stopped — revocation broadcasting to the network');
  } else {
    const f=state.form;
    GRANTS.unshift({id:'g'+(GRANTS.length+1), who:f.who, kind:f.kind, purpose:f.purpose, use:f.use, scope:f.scope, since:'Just now', expires:f.expires, status:'active'});
    ACTIVITY.unshift({ev:'grant', text:'Granted '+f.purpose+' access to '+f.who, when:'Just now'});
    state.form={kind:'institution',who:'',purpose:'Treatment',use:'Read & rely',scope:'Identity only',expires:'No expiry'};
    closeModal(); state.tab='access'; render(); toast('Access granted — signed and propagating');
  }
}
function openModal(){ $('modal').classList.add('on'); }
function closeModal(){ $('modal').classList.remove('on'); PENDING=null; }

let toastT=null;
function toast(m){const t=$('toast');t.innerHTML='<span>✓</span> '+m;t.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('on'),2800);}

$('tabs').addEventListener('click',e=>{const b=e.target.closest('button');if(b){state.tab=b.dataset.t;render();}});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
</body>
</html>
