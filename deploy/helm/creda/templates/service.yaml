# Headless service backing the StatefulSet (stable peer DNS).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "creda.fullname" . }}-headless
  labels: {{- include "creda.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector: {{- include "creda.selectorLabels" . | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.ports.http }}, targetPort: http }
    {{- if hasPrefix "tcp://" .Values.config.grpcSocket }}
    # Core gRPC TCP (testbed + ops tooling). Reachable in-cluster as
    # `<peer-name>-0.<release>-headless.<ns>.svc.cluster.local:<grpcPort>`.
    - { name: grpc, port: {{ .Values.ports.grpc }}, targetPort: grpc }
    {{- end }}
---
# FHIR HTTP API (Bridge) — in-cluster.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "creda.fullname" . }}-fhir
  labels: {{- include "creda.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector: {{- include "creda.selectorLabels" . | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.ports.http }}, targetPort: http }
---
# libp2p peer-to-peer endpoint — externally reachable (§10.6.5).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "creda.fullname" . }}-libp2p
  labels: {{- include "creda.labels" . | nindent 4 }}
spec:
  type: {{ .Values.libp2pService.type }}
  selector: {{- include "creda.selectorLabels" . | nindent 4 }}
  ports:
    - { name: libp2p, port: {{ .Values.ports.libp2p }}, targetPort: libp2p }
