{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "creda.serviceAccountName" . }}
  labels: {{- include "creda.labels" . | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
---
# Minimal RBAC (§10.6.5): read only the peer's own ConfigMap/Secrets in this namespace — no
# cluster-wide rights.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "creda.fullname" . }}
  labels: {{- include "creda.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "creda.fullname" . }}
  labels: {{- include "creda.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "creda.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "creda.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
