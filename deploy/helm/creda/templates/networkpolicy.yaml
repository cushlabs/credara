{{- if .Values.networkPolicy.enabled }}
# Restrict the peer's network exposure (§10.6.5): allow inbound to the Bridge's FHIR port and the
# Core libp2p port; allow egress for libp2p, DNS, and object storage. Tighten `from`/`to` per the
# institution's environment (the defaults are intentionally permissive on peer/egress because
# libp2p connects to arbitrary admitted peers).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "creda.fullname" . }}
  labels: {{- include "creda.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "creda.selectorLabels" . | nindent 6 }}
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - ports:
        - { protocol: TCP, port: {{ .Values.ports.http }} }    # FHIR clients
        - { protocol: TCP, port: {{ .Values.ports.libp2p }} }  # peers
        {{- if hasPrefix "tcp://" .Values.config.grpcSocket }}
        # Core gRPC TCP (testbed + ops tooling). Only rendered when grpcSocket is TCP — in the
        # production UDS default this port isn't bound and the rule would be moot. Operators
        # can scope `from:` per environment (e.g. namespace-scoped source) when needed.
        - { protocol: TCP, port: {{ .Values.ports.grpc }} }
        {{- end }}
  egress:
    - ports:
        - { protocol: TCP, port: {{ .Values.ports.libp2p }} }  # peer-to-peer
    - ports:                                                    # DNS
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    - {}  # object storage / registry — scope down per environment (TODO: restrict to S3/MinIO CIDR)
{{- end }}
