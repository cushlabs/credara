---
# Copy to group_vars/all.yml and adjust. These override deploy.yml's defaults.
creda_namespace: creda
cert_manager_version: v1.15.1
spire_version: 0.21.0

# Values passed to the Creda Helm chart (see deploy/helm/creda/values.yaml for all knobs).
creda_values:
  image:
    core:
      repository: ghcr.io/cushlabs/creda-core
      tag: "0.1.0"
    bridge:
      repository: ghcr.io/cushlabs/creda-bridge
      tag: "0.1.0"
  config:
    defaultPosture: treatment-presumed
  persistence:
    size: 50Gi
    storageClass: ""   # "" = cluster default; set for cloud (e.g. gp3) or on-prem
  # Participant key registry — admitted institutions' public keys for ingest authentication
  # (§3.6). Provide the ConfigMap out-of-band, e.g.
  #   kubectl create cm creda-participants -n creda \
  #     --from-file=mercy.key=mercy.key --from-file=lakeside.key=lakeside.key
  # Each file is "<algorithm> <hex-public-key>" (e.g. "ed25519 3b6a..."). How the ConfigMap is
  # *populated* (UDAP/TEFCA sync + cert validation + rotation/revocation) is an open question
  # (App C). Leave commented out to start with no participants admitted.
  # participantRegistry:
  #   configMapName: creda-participants
