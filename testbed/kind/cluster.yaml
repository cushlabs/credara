kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: creda-testbed
# Three nodes total. One control-plane (untainted via taints-removed below would let pods land
# there, but we keep the default taint so pod scheduling matches a real multi-node cluster).
nodes:
  - role: control-plane
  - role: worker
  - role: worker
networking:
  # Disable the kindnet default CNI? No — kindnet is fine for the testbed. NetworkPolicy enforcement
  # in kindnet is partial; if a future scenario needs strict NetworkPolicy (e.g. partition
  # simulation), switch to Calico via the standard kind+Calico recipe.
  apiServerAddress: "127.0.0.1"
  # Extra port mappings would go here if we wanted to expose libp2p on the host directly; we
  # rely on kubectl port-forward in scenarios instead, which keeps the cluster config minimal.
