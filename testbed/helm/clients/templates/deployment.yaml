apiVersion: apps/v1
kind: Deployment
metadata:
  name: creda-clients
  labels:
    app.kubernetes.io/name: creda-clients
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creda-clients
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creda-clients
    spec:
      # DQ-1: every container in every environment runs non-root, plus the restricted PSS
      # labels on the testbed namespaces require these fields.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: clients
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false   # nginx writes /var/cache/nginx
            capabilities: { drop: ["ALL"] }
          env:
            # Picked up by /docker-entrypoint.d/40-creda.sh — empty / "mock" leaves the SPA
            # in mock mode; "/fhir" turns on the nginx /fhir/* → bridgeUpstream proxy and
            # makes the SPA's FHIR client switch to the HTTP transport (same origin, no CORS).
            - name: FHIR_BASE
              value: {{ .Values.fhirBase | quote }}
            - name: BRIDGE_UPSTREAM
              value: {{ .Values.bridgeUpstream | quote }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: creda-clients
  labels:
    app.kubernetes.io/name: creda-clients
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: creda-clients
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
