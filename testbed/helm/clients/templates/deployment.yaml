apiVersion: apps/v1
kind: Deployment
metadata:
  name: creda-clients
  labels:
    app.kubernetes.io/name: creda-clients
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: creda-clients
  template:
    metadata:
      labels:
        app.kubernetes.io/name: creda-clients
    spec:
      # DQ-1: every container in every environment runs non-root, plus the restricted PSS
      # labels on the testbed namespaces require these fields.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: clients
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false   # nginx writes /var/cache/nginx
            capabilities: { drop: ["ALL"] }
          env:
            {{- if .Values.fhirBase }}
            # The clients pick up VITE_FHIR_BASE at build time; this is informational only
            # (the env is reflected in /healthz for debug). Real switching requires rebuilding
            # the image with the right --build-arg.
            - name: VITE_FHIR_BASE_INFO
              value: {{ .Values.fhirBase | quote }}
            {{- end }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 10
          resources: {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: creda-clients
  labels:
    app.kubernetes.io/name: creda-clients
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: creda-clients
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
