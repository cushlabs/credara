# Defaults for the testbed clients chart. Override per scenario as needed.

image:
  repository: creda-clients
  tag: testbed
  pullPolicy: Never   # see testbed/helm/values-peer-a.yaml for why

# Runtime FHIR-base selection — see clients/docker-entrypoint.sh. Empty / "mock" leaves the
# SPA in mock mode (in-memory fixtures); "/fhir" makes the SPA fetch from the same origin,
# and nginx proxies /fhir/* to bridgeUpstream.
fhirBase: ""

# Upstream the nginx /fhir/* proxy points at. Only consulted when fhirBase == "/fhir".
# Empty disables the proxy block. Typical real-mode value: http://creda-bridge:8080.
bridgeUpstream: ""

service:
  type: ClusterIP
  port: 8080

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits:   { cpu: 250m, memory: 192Mi }
