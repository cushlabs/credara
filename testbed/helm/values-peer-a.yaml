# Testbed values for peer-a — the seed peer.
#
# Differences from the production defaults:
# - gRPC over TCP on :50051 (port-forwardable from the host).
# - Both peers subscribe to bucket 0 so the smoke-test event lands in their shared mesh.
# - No bootstrap peers — peer-a is the seed.
# - Single replica; the testbed exercises gossip/AE between two PEERS, not within a StatefulSet.

# Force the Helm fullname to "peer" (without the chart-name suffix). This keeps the StatefulSet,
# pod, and Service names predictable — pod is `peer-0`, headless service is `peer-headless`.
fullnameOverride: peer

replicaCount: 1

image:
  core:
    repository: creda-core
    tag: testbed
    # Never — the image is loaded into the kind nodes by `make images`; there is no remote
    # registry for `creda-core:testbed`. Without this, kubelet falls back to pulling from
    # docker.io/library/creda-core:testbed and fails with ImagePullBackOff.
    pullPolicy: Never
  bridge:
    repository: creda-bridge
    tag: testbed
    pullPolicy: Never

config:
  dataDir: /var/lib/creda
  # TCP so the testbed driver can reach it via kubectl port-forward.
  grpcSocket: "tcp://0.0.0.0:50051"
  libp2pListen: /ip4/0.0.0.0/tcp/4001
  defaultPosture: treatment-presumed
  snapshotIntervalSecs: 21600
  subscribedBuckets: [0]
  bootstrapPeers: []

# The testbed disables the snapshot CronJob — scenarios don't need it and it just adds noise.
snapshotCronJob:
  enabled: false

# PDB at minAvailable:1 is fine even for single-replica; documented in §10.6.7.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Resource baselines stay at chart defaults; small enough for a kind worker.
